name: Build SimpleSvm Driver

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          
      - name: Build
        run: |
          mkdir build\output
          cd SimpleSvm
          msbuild SimpleSvm.vcxproj /p:Configuration=Release /p:Platform=x64 /p:OutDir=..\build\output\ /p:IntDir=..\build\obj\
        shell: cmd
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSvm
          path: build\output\*.sys
