name: Build SimpleSvm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          
      - name: Build Driver
        run: |
          mkdir build\output build\obj
          cd SimpleSvm
          ml64.exe /c /Fo..\..\build\obj\x64.obj x64.asm
          cl.exe /nologo /O2 /GS- /c /D_AMD64_ /D_WIN64 /I. /Fo..\..\build\obj\SimpleSvm.obj SimpleSvm.cpp
          link.exe /nologo /out:..\..\build\output\SimpleSvm.sys /driver /entry:DriverEntry /subsystem:native ..\..\build\obj\*.obj ntoskrnl.lib hal.lib
        shell: cmd
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSvm.sys
          path: build\output\*.sys
